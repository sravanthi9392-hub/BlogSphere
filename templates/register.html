{% extends 'base.html' %}
{% block content %}
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card shadow border-0 mt-5">
                <div class="card-body p-4">
                    <h3 class="text-center fw-bold mb-4">Join BlogSphere</h3>
                    <form action="{{ url_for('register') }}" method="POST">
                        <div class="mb-3">
                            <label class="form-label font-weight-bold">Choose Username</label>
                            <input type="text" name="username" class="form-control" required minlength="3">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Password Setup</label>
                            <input type="password" name="password" class="form-control" required>
                        </div>
                        <button type="submit" class="btn btn-primary w-100 mt-2">Create Secure Profile Account</button>
                    </form>
                    <div class="text-center mt-3">
                        <small class="text-muted">Have an account? <a href="{{ url_for('login') }}">Sign In</a></small>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
