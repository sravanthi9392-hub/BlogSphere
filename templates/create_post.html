{% extends 'base.html' %}
{% block content %}
<div class="container">
    <div class="row justify-content-center">
        <div class="col-lg-8">
            <div class="card shadow-sm p-4">
                <h2 class="fw-bold mb-4">Compose Fresh Entry</h2>
                <form action="{{ url_for('create_post') }}" method="POST">
                    <div class="mb-3">
                        <label class="form-label fw-bold">Blog Title</label>
                        <input type="text" name="title" class="form-control form-control-lg" placeholder="Enter title" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold">Category Vertical</label>
                        <select name="category" class="form-select" required>
                            {% for cat in categories %}
                                <option value="{{ cat }}">{{ cat }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold">Article Content Markdown</label>
                        <textarea id="blogContentEditor" name="content" class="form-control" rows="10" placeholder="Type content..." required></textarea>
                        <div id="charCounter" class="form-text text-end text-muted">0 characters written</div>
                    </div>
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-primary px-4">Publish Live</button>
                        <a href="{{ url_for('dashboard') }}" class="btn btn-outline-secondary">Discard</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
