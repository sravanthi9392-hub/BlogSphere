{% extends 'base.html' %}
{% block content %}
<div class="container">
    <div class="row justify-content-center">
        <div class="col-lg-8">
            <div class="card shadow-sm p-4">
                <h2 class="fw-bold mb-4">Modify Existing Draft</h2>
                <form action="{{ url_for('edit_post', post_id=post.id) }}" method="POST">
                    <div class="mb-3">
                        <label class="form-label fw-bold">Blog Title</label>
                        <input type="text" name="title" class="form-control form-control-lg" value="{{ post.title }}" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold">Category Classification</label>
                        <select name="category" class="form-select" required>
                            {% for cat in categories %}
                                <option value="{{ cat }}" {% if post.category == cat %}selected{% endif %}>{{ cat }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold">Article Content</label>
                        <textarea id="blogContentEditor" name="content" class="form-control" rows="10" required>{{ post.content }}</textarea>
                        <div id="charCounter" class="form-text text-end text-muted">{{ post.content|length }} characters tracking initialized</div>
                    </div>
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-success px-4">Commit and Save Modifications</button>
                        <a href="{{ url_for('view_post', post_id=post.id) }}" class="btn btn-outline-secondary">Cancel Changes</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
